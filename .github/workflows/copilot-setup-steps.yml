name: "Copilot Setup Steps"

# セットアップ手順が変更された際に自動的に実行して簡単に検証できるようにし、
# リポジトリの「Actions」タブから手動でテストを実行できるようにします。
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # ジョブ名は必ず `copilot-setup-steps` に設定する必要があります。
  # 別の名前にするとCopilotに認識されません。
  copilot-setup-steps:
    runs-on: ubuntu-latest

    # CopilotがIssueやPull Requestを操作するために必要な権限を付与します。
    # これらの権限はこのセットアップジョブに適用されるものです。
    # Copilotのメインセッションは独自のトークンを使用し、その権限はリポジトリの
    # 「Workflow permissions」設定によって決定されます
    # （Settings → Actions → General → Workflow permissions → "Read and write permissions"）。
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify gh CLI is available
        run: gh --version

      - name: Verify gh CLI authentication
        run: gh auth status
        env:
          GH_TOKEN: ${{ github.token }}
